<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CGPA Calculator — Ignitext</title>
  <script>
    tailwind = window.tailwind || {};
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ["Sora", "sans-serif"],
            body: ["Plus Jakarta Sans", "sans-serif"],
          },
          boxShadow: {
            glow: "0 10px 40px -12px rgba(2, 132, 199, 0.35)",
          },
          animation: {
            floatIn: "floatIn .45s ease-out",
            toastIn: "toastIn .3s ease-out",
          },
          keyframes: {
            floatIn: {
              "0%": { opacity: "0", transform: "translateY(18px) scale(.98)" },
              "100%": { opacity: "1", transform: "translateY(0) scale(1)" },
            },
            toastIn: {
              "0%": { opacity: "0", transform: "translateY(8px) scale(.98)" },
              "100%": { opacity: "1", transform: "translateY(0) scale(1)" },
            },
          },
        },
      },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root {
      --bg-1: #f8fafc;
      --bg-2: #e2e8f0;
      --bg-3: #dbeafe;
      --panel: rgba(255, 255, 255, 0.7);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --border: rgba(148, 163, 184, 0.28);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background:
        radial-gradient(1000px 500px at 90% -10%, rgba(14, 165, 233, 0.14), transparent 70%),
        radial-gradient(700px 350px at 10% 0%, rgba(16, 185, 129, 0.14), transparent 60%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2), var(--bg-3));
    }

    .glass {
      background: var(--panel);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
    }

    .glass-strong {
      background: var(--panel-strong);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
    }

    .invalid {
      border-color: #ef4444 !important;
      background: #fff1f2 !important;
      box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.08) inset;
    }

    .field-error {
      min-height: 1rem;
      font-size: 0.72rem;
      line-height: 1rem;
      color: #dc2626;
    }

    .field-error:empty {
      visibility: hidden;
    }

    .row-lab {
      background: linear-gradient(90deg, rgba(34, 197, 94, 0.08), rgba(255, 255, 255, 0.92));
    }

    .fade-mask {
      mask-image: linear-gradient(to right, transparent, black 2rem, black calc(100% - 2rem), transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 2rem, black calc(100% - 2rem), transparent);
    }

    .mark-group {
      transition: opacity 180ms ease, transform 180ms ease, max-height 180ms ease;
    }

    .tab-button {
      transition: background-color 180ms ease, color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
    }

    .tab-button:hover {
      transform: translateY(-1px);
    }

    .tab-button.is-active {
      background: #0f172a;
      color: #ffffff;
      box-shadow: 0 12px 32px -14px rgba(15, 23, 42, 0.55);
    }

    .dashboard-panel {
      transition: opacity 240ms ease, transform 240ms ease;
    }

    .dashboard-panel.is-hidden {
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
      position: absolute;
      inset: 0;
    }

    .metric-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(248, 250, 252, 0.9));
      border: 1px solid rgba(148, 163, 184, 0.18);
    }

    .dashboard-shell {
      position: relative;
      min-height: 1px;
    }

    .ip-row {
      background: linear-gradient(90deg, rgba(251, 191, 36, 0.15), rgba(255, 255, 255, 0.95));
      box-shadow: inset 0 0 0 1px rgba(245, 158, 11, 0.18);
    }

    .ip-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      border-radius: 9999px;
      background: rgba(245, 158, 11, 0.15);
      color: #b45309;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 0.6rem;
    }

    .report-preview {
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body class="min-h-screen font-body text-slate-800">
  <div class="relative min-h-screen">
    <div class="fixed right-0 top-0 -z-10 h-[280px] w-[280px] rounded-full bg-cyan-300/30 blur-3xl"></div>
    <div class="fixed bottom-0 left-0 -z-10 h-[260px] w-[260px] rounded-full bg-emerald-300/30 blur-3xl"></div>
    <div class="fixed left-1/2 top-0 -z-10 h-[320px] w-[600px] -translate-x-1/2 rounded-full bg-amber-200/30 blur-3xl"></div>

    <main class="mx-auto max-w-7xl px-4 pb-12 pt-6 sm:px-6 lg:px-8">
      <section class="glass-strong overflow-hidden rounded-[2rem] p-6 shadow-glow md:p-8">
        <div class="flex flex-col gap-5 lg:flex-row lg:items-end lg:justify-between">
          <div class="max-w-2xl">
            <p class="mb-2 inline-flex items-center gap-2 rounded-full bg-slate-900 px-3 py-1 text-xs font-bold uppercase tracking-[0.28em] text-cyan-300">
              Ignitext CGPA Suite
            </p>
            <h1 class="font-display text-4xl font-extrabold tracking-tight text-slate-950 sm:text-5xl">Three regulation dashboards, one clean shell</h1>
            <p class="mt-3 text-base leading-7 text-slate-600">
              Switch between R22, R24, and R25 without shared state collisions. Each dashboard keeps its own subject list, calculation logic, analytics, and report export.
            </p>
          </div>

          <div class="flex flex-wrap gap-2 rounded-2xl bg-white/70 p-2 shadow-sm backdrop-blur-sm">
            <button class="tab-button is-active rounded-xl px-4 py-2 text-sm font-bold text-slate-600" data-switch-dashboard="R22">R22</button>
            <button class="tab-button rounded-xl px-4 py-2 text-sm font-bold text-slate-600" data-switch-dashboard="R24">R24</button>
            <button class="tab-button rounded-xl px-4 py-2 text-sm font-bold text-slate-600" data-switch-dashboard="R25">R25</button>
          </div>
        </div>
      </section>

      <section id="dashboardStage" class="dashboard-shell mt-6 space-y-8"></section>
    </main>

    <div id="toast" class="pointer-events-none fixed bottom-5 right-5 z-50 hidden rounded-xl bg-slate-900 px-4 py-3 text-sm font-medium text-white shadow-2xl">
      Ready.
    </div>
  </div>

  <script>
    const subjectsR22 = [];
    const subjectsR24 = [];
    const subjectsR25 = [];

    const dashboardStage = document.getElementById("dashboardStage");
    const toast = document.getElementById("toast");
    const tabButtons = Array.from(document.querySelectorAll("[data-switch-dashboard]"));

    const dashboards = {
      R22: {
        key: "R22",
        title: "R22 Dashboard",
        description: "Theory and lab follow the R22 internal structure with separate validation and analytics.",
        accent: "from-cyan-500 to-sky-600",
        panelId: "dashboard-r22",
        bodyId: "body-r22",
        metricsId: "metrics-r22",
        resultId: "results-r22",
        cgpaId: "cgpa-r22",
        percentageId: "percentage-r22",
        passFailId: "passfail-r22",
        creditsId: "credits-r22",
        addBtnId: "add-r22",
        calculateBtnId: "calc-r22",
        resetBtnId: "reset-r22",
        downloadBtnId: "download-r22",
        analytics: {
          marksInputId: "next-grade-input-r22",
          marksOutputId: "next-grade-output-r22",
          targetCgpaInputId: "target-cgpa-input-r22",
          targetCreditsInputId: "target-credits-input-r22",
          targetOutputId: "target-cgpa-output-r22",
        },
        subjects: subjectsR22,
        sampleSubjects: [],
        fieldLabels: {
          theory: ["Mid 1", "Mid 2", "Assignments"],
          lab: ["Day-to-Day", "Skill Test 1", "Skill Test 2"],
        },
      },
      R24: {
        key: "R24",
        title: "R24 Dashboard",
        description: "R24 uses separate theory and lab computation plus a highlighted Integrated Project row.",
        accent: "from-amber-500 to-orange-600",
        panelId: "dashboard-r24",
        bodyId: "body-r24",
        metricsId: "metrics-r24",
        resultId: "results-r24",
        cgpaId: "cgpa-r24",
        percentageId: "percentage-r24",
        passFailId: "passfail-r24",
        creditsId: "credits-r24",
        addBtnId: "add-r24",
        calculateBtnId: "calc-r24",
        resetBtnId: "reset-r24",
        downloadBtnId: "download-r24",
        analytics: {
          marksInputId: "next-grade-input-r24",
          marksOutputId: "next-grade-output-r24",
          targetCgpaInputId: "target-cgpa-input-r24",
          targetCreditsInputId: "target-credits-input-r24",
          targetOutputId: "target-cgpa-output-r24",
        },
        subjects: subjectsR24,
        sampleSubjects: [createIpSubject()],
        fieldLabels: {
          theory: ["Mid 1", "Mid 2", "Assignments"],
          lab: ["CIE", "Skill Test 1", "Skill Test 2"],
        },
      },
      R25: {
        key: "R25",
        title: "R25 Dashboard",
        description: "R25 mirrors the R24 structure, but without the Integrated Project default subject.",
        accent: "from-emerald-500 to-teal-600",
        panelId: "dashboard-r25",
        bodyId: "body-r25",
        metricsId: "metrics-r25",
        resultId: "results-r25",
        cgpaId: "cgpa-r25",
        percentageId: "percentage-r25",
        passFailId: "passfail-r25",
        creditsId: "credits-r25",
        addBtnId: "add-r25",
        calculateBtnId: "calc-r25",
        resetBtnId: "reset-r25",
        downloadBtnId: "download-r25",
        analytics: {
          marksInputId: "next-grade-input-r25",
          marksOutputId: "next-grade-output-r25",
          targetCgpaInputId: "target-cgpa-input-r25",
          targetCreditsInputId: "target-credits-input-r25",
          targetOutputId: "target-cgpa-output-r25",
        },
        subjects: subjectsR25,
        sampleSubjects: [],
        fieldLabels: {
          theory: ["Mid 1", "Mid 2", "Assignments"],
          lab: ["CIE", "Skill Test 1", "Skill Test 2"],
        },
      },
    };

    function createIpSubject() {
      return {
        regulation: "R24",
        kind: "ip",
        subject: "Integrated Project",
        credits: 4,
        internal: 80,
        external: 20,
        locked: true,
        rowEl: null,
        controls: {},
      };
    }

    function createEmptyRegularSubject(regulation) {
      return {
        regulation,
        kind: "regular",
        type: "theory",
        subject: "",
        credits: "",
        mid1: "",
        mid2: "",
        assignments: "",
        cie: "",
        skill1: "",
        skill2: "",
        dayToDay: "",
        external: "",
        rowEl: null,
        controls: {},
      };
    }

    function cloneSubject(subject) {
      return JSON.parse(JSON.stringify(subject));
    }

    function makeInput(type, value, placeholder, className, min, max, step = "any") {
      const input = document.createElement("input");
      input.type = type;
      input.value = value ?? "";
      input.placeholder = placeholder;
      input.className = className;
      if (min !== null && min !== undefined) input.min = min;
      if (max !== null && max !== undefined) input.max = max;
      if (step !== null && step !== undefined) input.step = step;
      return input;
    }

    function makeSelect(value) {
      const select = document.createElement("select");
      select.className = "w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none transition focus:border-cyan-500";
      select.innerHTML = `
        <option value="theory">Theory</option>
        <option value="lab">Lab</option>
      `;
      select.value = value;
      return select;
    }

    function makeField(labelText, input) {
      const wrapper = document.createElement("div");
      wrapper.className = "mark-group space-y-1";
      const label = document.createElement("div");
      label.className = "text-[11px] font-semibold uppercase tracking-wider text-slate-500";
      label.textContent = labelText;
      const error = document.createElement("div");
      error.className = "field-error";
      wrapper.append(label, input, error);
      return { wrapper, error };
    }

    function setError(input, errorNode, message) {
      input.classList.add("invalid");
      errorNode.textContent = message;
    }

    function clearError(input, errorNode) {
      input.classList.remove("invalid");
      errorNode.textContent = "";
    }

    function parseValue(input) {
      if (!input || input.value.trim() === "") return 0;
      const value = Number(input.value);
      return Number.isFinite(value) ? value : 0;
    }

    function validateNumber(input, errorNode, label, max, required, min = 0) {
      const raw = input.value.trim();
      if (raw === "") {
        if (required) {
          setError(input, errorNode, `${label} is required`);
          return false;
        }
        clearError(input, errorNode);
        return true;
      }

      const value = Number(raw);
      if (!Number.isFinite(value)) {
        setError(input, errorNode, `${label} must be a number`);
        return false;
      }
      if (value < min || value > max) {
        setError(input, errorNode, `${label} must be ${min}-${max}`);
        return false;
      }

      clearError(input, errorNode);
      return true;
    }

    function makeBadge(text, variant = "neutral") {
      const badge = document.createElement("span");
      badge.className = variant === "neutral"
        ? "inline-flex items-center rounded-full bg-slate-100 px-2.5 py-1 text-[11px] font-bold uppercase tracking-wider text-slate-700"
        : variant === "ip"
          ? "ip-badge"
          : variant === "active"
            ? "inline-flex items-center rounded-full bg-emerald-100 px-2.5 py-1 text-[11px] font-bold uppercase tracking-wider text-emerald-700"
            : "inline-flex items-center rounded-full bg-slate-100 px-2.5 py-1 text-[11px] font-bold uppercase tracking-wider text-slate-700";
      badge.textContent = text;
      return badge;
    }

    function getGrade(total, external, ignoreExternalFloor = false) {
      if ((!ignoreExternalFloor && external < 20) || total < 40) return { grade: "F", points: 0, color: "bg-red-100 text-red-700" };
      if (total >= 90) return { grade: "O", points: 10, color: "bg-emerald-100 text-emerald-700" };
      if (total >= 80) return { grade: "A+", points: 9, color: "bg-lime-100 text-lime-700" };
      if (total >= 70) return { grade: "A", points: 8, color: "bg-yellow-100 text-yellow-700" };
      if (total >= 60) return { grade: "B+", points: 7, color: "bg-orange-100 text-orange-700" };
      if (total >= 50) return { grade: "B", points: 6, color: "bg-blue-100 text-blue-700" };
      return { grade: "C", points: 5, color: "bg-violet-100 text-violet-700" };
    }

    function getScoreThreshold(total) {
      if (total < 40) return { next: 40, grade: "C" };
      if (total < 50) return { next: 50, grade: "B" };
      if (total < 60) return { next: 60, grade: "B+" };
      if (total < 70) return { next: 70, grade: "A" };
      if (total < 80) return { next: 80, grade: "A+" };
      if (total < 90) return { next: 90, grade: "O" };
      return { next: 100, grade: "O" };
    }

    function getFieldConfig(regulationKey, type) {
      const config = dashboards[regulationKey];
      return config.fieldLabels[type];
    }

    function getLimits(regulationKey, type, kind = "regular") {
      if (kind === "ip") {
        return { internal: 80, external: 20 };
      }

      if (regulationKey === "R22") {
        if (type === "lab") {
          return { first: 20, second: 30, third: 30, external: 50 };
        }
        return { first: 30, second: 30, third: 20, external: 50 };
      }

      if (type === "lab") {
        return { first: 20, second: 30, third: 30, external: 20 };
      }
      return { first: 20, second: 20, third: 10, external: 50 };
    }

    function calculateInternalR22(subject) {
      if (subject.kind === "ip") return 80;
      if (subject.type === "lab") {
        return Math.min(50, parseValue(subject.controls.dayToDayInput) + ((parseValue(subject.controls.skill1Input) + parseValue(subject.controls.skill2Input)) / 2));
      }
      return Math.min(50, ((parseValue(subject.controls.mid1Input) + parseValue(subject.controls.mid2Input)) / 2) + parseValue(subject.controls.assignmentsInput));
    }

    function calculateInternalR24(subject) {
      if (subject.kind === "ip") return 80;
      if (subject.type === "lab") {
        return Math.min(80, parseValue(subject.controls.cieInput) + ((parseValue(subject.controls.skill1Input) + parseValue(subject.controls.skill2Input)) / 2));
      }
      return Math.min(50, parseValue(subject.controls.mid1Input) + parseValue(subject.controls.mid2Input) + parseValue(subject.controls.assignmentsInput));
    }

    function calculateInternalR25(subject) {
      return calculateInternalR24(subject);
    }

    function validateRegularSubject(subject, config) {
      const controls = subject.controls;
      const limits = getLimits(config.key, subject.type, subject.kind);
      const subjectValid = controls.subjectInput.value.trim() !== "";
      if (!subjectValid) {
        setError(controls.subjectInput, controls.subjectError, "Subject name is required");
      } else {
        clearError(controls.subjectInput, controls.subjectError);
      }

      const creditsValid = validateNumber(controls.creditsInput, controls.creditsError, "Credits", 9999, true, 1);
      const externalValid = validateNumber(controls.externalInput, controls.externalError, "External", limits.external, true, 0);

      const markValid = subject.type === "lab"
        ? [
            validateNumber(controls.primaryInput, controls.primaryError, controls.primaryLabel, limits.first, true, 0),
            validateNumber(controls.secondaryInput, controls.secondaryError, controls.secondaryLabel, limits.second, true, 0),
            validateNumber(controls.tertiaryInput, controls.tertiaryError, controls.tertiaryLabel, limits.third, true, 0),
          ].every(Boolean)
        : [
            validateNumber(controls.primaryInput, controls.primaryError, controls.primaryLabel, limits.first, true, 0),
            validateNumber(controls.secondaryInput, controls.secondaryError, controls.secondaryLabel, limits.second, true, 0),
            validateNumber(controls.tertiaryInput, controls.tertiaryError, controls.tertiaryLabel, limits.third, true, 0),
          ].every(Boolean);

      return { subjectValid, creditsValid, externalValid, markValid };
    }

    function validateIpSubject(subject) {
      const controls = subject.controls;
      const subjectValid = controls.subjectInput.value.trim() !== "";
      if (!subjectValid) {
        setError(controls.subjectInput, controls.subjectError, "Subject name is required");
      } else {
        clearError(controls.subjectInput, controls.subjectError);
      }

      const creditsValid = validateNumber(controls.creditsInput, controls.creditsError, "Credits", 9999, true, 1);
      const internalValid = validateNumber(controls.internalInput, controls.internalError, "Internal", 80, true, 0);
      const externalValid = validateNumber(controls.externalInput, controls.externalError, "External", 20, true, 0);
      return { subjectValid, creditsValid, internalValid, externalValid };
    }

    function createSubjectRow(subject, config) {
      const row = document.createElement("tr");
      row.className = "group rounded-2xl bg-white/80 shadow-sm transition duration-200 hover:shadow-md";
      if (subject.kind === "ip") {
        row.classList.add("ip-row");
      }

      const subjectCell = document.createElement("td");
      subjectCell.className = "px-3 py-2 align-top";
      const subjectStack = document.createElement("div");
      subjectStack.className = "space-y-2";
      const subjectInput = makeInput("text", subject.subject, "Subject name", "w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none transition focus:border-cyan-500", null, null, "text");
      const subjectField = makeField("Subject", subjectInput);
      if (subject.kind === "ip") {
        subjectInput.readOnly = true;
        subjectInput.classList.add("bg-amber-50");
      }
      subjectStack.append(subjectField.wrapper);
      if (subject.kind === "ip") {
        subjectStack.append(makeBadge("IP", "ip"));
      }
      subjectCell.append(subjectStack);

      const typeCell = document.createElement("td");
      typeCell.className = "px-3 py-2 align-top";
      const typeStack = document.createElement("div");
      typeStack.className = "space-y-2";
      let typeBadge = makeBadge("Theory");
      let typeSelect = null;
      if (subject.kind === "ip") {
        typeBadge = makeBadge("IP", "ip");
      } else {
        typeSelect = makeSelect(subject.type);
        typeBadge = makeBadge(subject.type === "lab" ? "Lab" : "Theory", subject.type === "lab" ? "active" : "neutral");
        typeSelect.addEventListener("change", () => {
          subject.type = typeSelect.value;
          updateSubjectRow(subject, config);
        });
        typeStack.append(typeSelect);
      }
      typeStack.append(typeBadge);
      typeCell.append(typeStack);

      const creditsCell = document.createElement("td");
      creditsCell.className = "px-3 py-2 align-top";
      const creditsInput = makeInput("number", subject.credits, "Credits", "w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none transition focus:border-cyan-500", 1, null, "1");
      const creditsField = makeField("Credits", creditsInput);
      creditsCell.append(creditsField.wrapper);

      const theoryCell = document.createElement("td");
      theoryCell.className = "px-3 py-2 align-top";
      const theoryWrap = document.createElement("div");
      theoryWrap.className = "grid gap-2 xl:grid-cols-3";
      const theoryLabels = getFieldConfig(config.key, "theory");
      const limits = getLimits(config.key, subject.type, subject.kind);
      const primaryInput = makeInput("number", subject.type === "lab" ? (config.key === "R22" ? subject.dayToDay : subject.cie) : subject.mid1, `0-${subject.type === "lab" ? limits.first : limits.first}`, "w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none transition focus:border-cyan-500", 0, subject.type === "lab" ? limits.first : limits.first, "1");
      const secondaryInput = makeInput("number", subject.type === "lab" ? subject.skill1 : subject.mid2, `0-${subject.type === "lab" ? limits.second : limits.second}`, "w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none transition focus:border-cyan-500", 0, subject.type === "lab" ? limits.second : limits.second, "1");
      const tertiaryInput = makeInput("number", subject.type === "lab" ? subject.skill2 : subject.assignments, `0-${subject.type === "lab" ? limits.third : limits.third}`, "w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none transition focus:border-cyan-500", 0, subject.type === "lab" ? limits.third : limits.third, "1");
      const primaryField = makeField(subject.type === "lab" ? theoryLabels[0] : theoryLabels[0], primaryInput);
      const secondaryField = makeField(theoryLabels[1], secondaryInput);
      const tertiaryField = makeField(theoryLabels[2], tertiaryInput);
      theoryWrap.append(primaryField.wrapper, secondaryField.wrapper, tertiaryField.wrapper);
      theoryCell.append(theoryWrap);

      const labCell = document.createElement("td");
      labCell.className = "px-3 py-2 align-top";
      const labWrap = document.createElement("div");
      labWrap.className = "grid gap-2 xl:grid-cols-3";
      const labLabels = getFieldConfig(config.key, "lab");
      const labPrimaryInput = makeInput("number", subject.type === "lab" ? (config.key === "R22" ? subject.dayToDay : subject.cie) : "", `0-${limits.first}`, "w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none transition focus:border-cyan-500", 0, limits.first, "1");
      const labSecondaryInput = makeInput("number", subject.type === "lab" ? subject.skill1 : "", `0-${limits.second}`, "w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none transition focus:border-cyan-500", 0, limits.second, "1");
      const labTertiaryInput = makeInput("number", subject.type === "lab" ? subject.skill2 : "", `0-${limits.third}`, "w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none transition focus:border-cyan-500", 0, limits.third, "1");
      const labPrimaryField = makeField(labLabels[0], labPrimaryInput);
      const labSecondaryField = makeField(labLabels[1], labSecondaryInput);
      const labTertiaryField = makeField(labLabels[2], labTertiaryInput);
      labWrap.append(labPrimaryField.wrapper, labSecondaryField.wrapper, labTertiaryField.wrapper);
      labCell.append(labWrap);

      const internalCell = document.createElement("td");
      internalCell.className = "px-3 py-2 font-semibold text-slate-700 align-top";
      const internalInput = subject.kind === "ip"
        ? makeInput("number", subject.internal, "0-80", "w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none transition focus:border-cyan-500", 0, 80, "1")
        : null;
      const internalField = subject.kind === "ip" ? makeField("Internal", internalInput) : null;
      if (subject.kind === "ip") {
        internalCell.append(internalField.wrapper);
      } else {
        internalCell.textContent = "0.00";
      }

      const externalCell = document.createElement("td");
      externalCell.className = "px-3 py-2 align-top";
      const externalLimit = subject.kind === "ip" ? 20 : getLimits(config.key, subject.type).external;
      const externalInput = makeInput("number", subject.external, `0-${externalLimit}`, "w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none transition focus:border-cyan-500", 0, externalLimit, "1");
      const externalField = makeField("External", externalInput);
      externalCell.append(externalField.wrapper);

      const gradeCell = document.createElement("td");
      gradeCell.className = "px-3 py-2 align-top";
      gradeCell.innerHTML = '<span class="rounded-lg bg-slate-100 px-2.5 py-1 text-xs font-bold text-slate-700">-</span>';

      const pointsCell = document.createElement("td");
      pointsCell.className = "px-3 py-2 font-bold text-slate-700 align-top";
      pointsCell.textContent = subject.kind === "ip" ? "10" : "0";

      const actionCell = document.createElement("td");
      actionCell.className = "px-3 py-2 text-center align-top";
      const deleteBtn = document.createElement("button");
      deleteBtn.type = "button";
      deleteBtn.className = "inline-flex h-9 w-9 items-center justify-center rounded-lg bg-rose-50 text-rose-600 transition hover:bg-rose-100 disabled:cursor-not-allowed disabled:opacity-40";
      deleteBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
      actionCell.appendChild(deleteBtn);

      if (subject.kind !== "ip") {
        deleteBtn.addEventListener("click", () => {
          const index = config.subjects.indexOf(subject);
          if (index >= 0) {
            config.subjects.splice(index, 1);
          }
          renderDashboard(config.key);
          showToast(`${config.key} subject removed.`);
        });
      } else {
        deleteBtn.disabled = true;
      }

      row.append(subjectCell, typeCell, creditsCell, theoryCell, labCell, internalCell, externalCell, gradeCell, pointsCell, actionCell);

      subject.controls = {
        row,
        subjectInput,
        subjectError: subjectField.error,
        typeSelect,
        typeBadge,
        creditsInput,
        creditsError: creditsField.error,
        primaryInput,
        primaryError: primaryField.error,
        primaryLabel: theoryLabels[0],
        secondaryInput,
        secondaryError: secondaryField.error,
        secondaryLabel: theoryLabels[1],
        tertiaryInput,
        tertiaryError: tertiaryField.error,
        tertiaryLabel: theoryLabels[2],
        internalInput,
        internalError: internalField?.error,
        externalInput,
        externalError: externalField.error,
        internalCell,
        gradeCell,
        pointsCell,
        theoryCell,
        labCell,
      };

      [subjectInput, creditsInput, primaryInput, secondaryInput, tertiaryInput, internalInput, externalInput].filter(Boolean).forEach((input) => {
        input.addEventListener("input", () => {
          syncSubjectFromInputs(subject, config);
          previewSubject(subject, config);
        });
      });

      updateSubjectRow(subject, config);
      return row;
    }

    function syncSubjectFromInputs(subject, config) {
      const controls = subject.controls;
      subject.subject = controls.subjectInput.value;
      subject.credits = controls.creditsInput.value;

      if (subject.kind === "ip") {
        subject.internal = controls.internalInput.value;
        subject.external = controls.externalInput.value;
        return;
      }

      subject.type = controls.typeSelect ? controls.typeSelect.value : subject.type;

      if (subject.type === "lab") {
        if (config.key === "R22") {
          subject.dayToDay = controls.primaryInput.value;
          subject.skill1 = controls.secondaryInput.value;
          subject.skill2 = controls.tertiaryInput.value;
        } else {
          subject.cie = controls.primaryInput.value;
          subject.skill1 = controls.secondaryInput.value;
          subject.skill2 = controls.tertiaryInput.value;
        }
        subject.mid1 = "";
        subject.mid2 = "";
        subject.assignments = "";
      } else {
        subject.mid1 = controls.primaryInput.value;
        subject.mid2 = controls.secondaryInput.value;
        subject.assignments = controls.tertiaryInput.value;
        subject.dayToDay = "";
        subject.cie = "";
        subject.skill1 = "";
        subject.skill2 = "";
      }

      subject.external = controls.externalInput.value;
    }

    function updateSubjectRow(subject, config) {
      const controls = subject.controls;
      if (!controls || !controls.row) return;

      if (subject.kind === "ip") {
        controls.subjectInput.value = subject.subject;
        controls.subjectInput.readOnly = true;
        controls.creditsInput.value = subject.credits;
        controls.creditsInput.readOnly = false;
        controls.internalInput.value = subject.internal ?? "";
        controls.internalInput.max = 80;
        controls.internalInput.placeholder = "0-80";
        controls.externalInput.value = subject.external ?? "";
        controls.externalInput.max = 20;
        controls.externalInput.placeholder = "0-20";
        controls.theoryCell.classList.add("hidden");
        controls.labCell.classList.add("hidden");
        controls.row.classList.add("ip-row");
        clearError(controls.internalInput, controls.internalError);
        clearError(controls.externalInput, controls.externalError);
        return;
      }

      const isLab = subject.type === "lab";
      const limits = getLimits(config.key, subject.type);
      const labels = getFieldConfig(config.key, subject.type);

      controls.typeBadge.textContent = isLab ? "Lab" : "Theory";
      controls.typeBadge.className = isLab
        ? "inline-flex items-center rounded-full bg-emerald-100 px-2.5 py-1 text-[11px] font-bold uppercase tracking-wider text-emerald-700"
        : "inline-flex items-center rounded-full bg-slate-100 px-2.5 py-1 text-[11px] font-bold uppercase tracking-wider text-slate-700";

      controls.theoryCell.classList.toggle("hidden", isLab);
      controls.labCell.classList.toggle("hidden", !isLab);

      controls.primaryLabel = labels[0];
      controls.secondaryLabel = labels[1];
      controls.tertiaryLabel = labels[2];
      controls.primaryInput.max = isLab ? limits.first : limits.first;
      controls.secondaryInput.max = isLab ? limits.second : limits.second;
      controls.tertiaryInput.max = isLab ? limits.third : limits.third;
      controls.externalInput.max = limits.external;
      controls.externalInput.placeholder = `0-${limits.external}`;

      controls.primaryInput.value = isLab
        ? (config.key === "R22" ? subject.dayToDay : subject.cie)
        : subject.mid1;
      controls.secondaryInput.value = isLab ? subject.skill1 : subject.mid2;
      controls.tertiaryInput.value = isLab ? subject.skill2 : subject.assignments;
      controls.externalInput.value = subject.external;
      controls.subjectInput.value = subject.subject;
      controls.creditsInput.value = subject.credits;

      controls.primaryFieldLabel = labels[0];
      controls.secondaryFieldLabel = labels[1];
      controls.tertiaryFieldLabel = labels[2];

      controls.primaryInput.placeholder = `0-${isLab ? limits.first : limits.first}`;
      controls.secondaryInput.placeholder = `0-${isLab ? limits.second : limits.second}`;
      controls.tertiaryInput.placeholder = `0-${isLab ? limits.third : limits.third}`;
      controls.internalCell.textContent = "0.00";

      clearError(controls.subjectInput, controls.subjectError);
      clearError(controls.creditsInput, controls.creditsError);
      clearError(controls.primaryInput, controls.primaryError);
      clearError(controls.secondaryInput, controls.secondaryError);
      clearError(controls.tertiaryInput, controls.tertiaryError);
      clearError(controls.externalInput, controls.externalError);

      if (isLab) {
        controls.row.classList.add("row-lab");
      } else {
        controls.row.classList.remove("row-lab");
      }
    }

    function previewSubject(subject, config) {
      const controls = subject.controls;
      if (!controls) return;

      if (subject.kind === "ip") {
        updateSubjectRow(subject, config);
        const result = validateIpSubject(subject);
        if (!result.subjectValid || !result.creditsValid || !result.internalValid || !result.externalValid) {
          controls.gradeCell.innerHTML = '<span class="rounded-lg bg-slate-100 px-2.5 py-1 text-xs font-bold text-slate-700">-</span>';
          controls.pointsCell.textContent = "0";
          return;
        }

        const internal = Number(controls.internalInput.value);
        const external = Number(controls.externalInput.value);
        const total = internal + external;
        const gradeInfo = getGrade(total, external, true);
        controls.gradeCell.innerHTML = `<span class="rounded-lg px-2.5 py-1 text-xs font-bold ${gradeInfo.color}">${gradeInfo.grade}</span>`;
        controls.pointsCell.textContent = String(gradeInfo.points);
        controls.row.classList.toggle("bg-red-100", gradeInfo.grade === "F");
        controls.row.classList.toggle("ring-1", gradeInfo.grade === "F");
        controls.row.classList.toggle("ring-red-300", gradeInfo.grade === "F");
        return;
      }

      updateSubjectRow(subject, config);
      const result = validateRegularSubject(subject, config);
      const internal = config.key === "R22"
        ? calculateInternalR22(subject)
        : config.key === "R24"
          ? calculateInternalR24(subject)
          : calculateInternalR25(subject);
      controls.internalCell.textContent = internal.toFixed(2);

      if (!result.subjectValid || !result.creditsValid || !result.externalValid || !result.markValid) {
        controls.gradeCell.innerHTML = '<span class="rounded-lg bg-slate-100 px-2.5 py-1 text-xs font-bold text-slate-700">-</span>';
        controls.pointsCell.textContent = "0";
        controls.row.classList.remove("bg-red-100", "ring-1", "ring-red-300");
        return;
      }

      const total = internal + parseValue(controls.externalInput);
      const gradeInfo = getGrade(total, parseValue(controls.externalInput));
      controls.gradeCell.innerHTML = `<span class="rounded-lg px-2.5 py-1 text-xs font-bold ${gradeInfo.color}">${gradeInfo.grade}</span>`;
      controls.pointsCell.textContent = String(gradeInfo.points);
      controls.row.classList.toggle("bg-red-100", gradeInfo.grade === "F");
      controls.row.classList.toggle("ring-1", gradeInfo.grade === "F");
      controls.row.classList.toggle("ring-red-300", gradeInfo.grade === "F");
    }

    function renderDashboardShell() {
      dashboardStage.innerHTML = Object.values(dashboards).map(createDashboardMarkup).join("");
    }

    function ensureSamples(config) {
      if (!config.subjects.length) {
        config.sampleSubjects.forEach((sample) => {
          config.subjects.push(cloneSubject(sample));
        });
      }
    }

    function renderSubjectList(config) {
      const tbody = document.getElementById(config.bodyId);
      tbody.innerHTML = "";

      if (!config.subjects.length) {
        const emptyRow = document.createElement("tr");
        emptyRow.innerHTML = `
          <td colspan="10" class="px-4 py-8 text-center text-sm text-slate-500">
            No subjects yet. Use Add Subject to build this dashboard.
          </td>
        `;
        tbody.appendChild(emptyRow);
        return;
      }

      config.subjects.forEach((subject) => {
        const row = createSubjectRow(subject, config);
        subject.rowEl = row;
        tbody.appendChild(row);
      });
    }

    function calculateCGPA(data) {
      if (!data.length) {
        return { valid: false, reason: "Add at least one subject before calculation." };
      }

      let hasInvalidInput = false;
      let weightedPoints = 0;
      let totalCredits = 0;
      let weightedTotalMarks = 0;
      let passCount = 0;
      let failCount = 0;

      data.forEach((subject) => {
        const controls = subject.controls;
        if (!controls) return;

        if (subject.kind === "ip") {
          const result = validateIpSubject(subject);
          if (!result.subjectValid || !result.creditsValid || !result.internalValid || !result.externalValid) {
            hasInvalidInput = true;
            controls.gradeCell.innerHTML = '<span class="rounded-lg bg-slate-100 px-2.5 py-1 text-xs font-bold text-slate-700">-</span>';
            controls.pointsCell.textContent = "0";
            return;
          }

          const credits = Number(controls.creditsInput.value);
          const internal = Number(controls.internalInput.value);
          const external = Number(controls.externalInput.value);
          const total = internal + external;
          const gradeInfo = getGrade(total, external, true);
          controls.gradeCell.innerHTML = `<span class="rounded-lg px-2.5 py-1 text-xs font-bold ${gradeInfo.color}">${gradeInfo.grade}</span>`;
          controls.pointsCell.textContent = String(gradeInfo.points);
          if (gradeInfo.grade === "F") {
            failCount += 1;
            controls.row.classList.add("bg-red-100", "ring-1", "ring-red-300");
          } else {
            passCount += 1;
            controls.row.classList.remove("bg-red-100", "ring-1", "ring-red-300");
          }
          weightedPoints += credits * gradeInfo.points;
          weightedTotalMarks += credits * total;
          totalCredits += credits;
          return;
        }

        const regulation = subject.regulation;
        const result = validateRegularSubject(subject, dashboards[regulation]);

        if (!result.subjectValid || !result.creditsValid || !result.externalValid || !result.markValid) {
          hasInvalidInput = true;
          controls.gradeCell.innerHTML = '<span class="rounded-lg bg-slate-100 px-2.5 py-1 text-xs font-bold text-slate-700">-</span>';
          controls.pointsCell.textContent = "0";
          return;
        }

        const credits = Number(controls.creditsInput.value);
        const external = Number(controls.externalInput.value);
        const internal = regulation === "R22"
          ? calculateInternalR22(subject)
          : regulation === "R24"
            ? calculateInternalR24(subject)
            : calculateInternalR25(subject);

        controls.internalCell.textContent = internal.toFixed(2);

        const total = internal + external;
        const gradeInfo = getGrade(total, external);
        controls.gradeCell.innerHTML = `<span class="rounded-lg px-2.5 py-1 text-xs font-bold ${gradeInfo.color}">${gradeInfo.grade}</span>`;
        controls.pointsCell.textContent = String(gradeInfo.points);

        if (gradeInfo.grade === "F") {
          failCount += 1;
          controls.row.classList.add("bg-red-100", "ring-1", "ring-red-300");
        } else {
          passCount += 1;
          controls.row.classList.remove("bg-red-100", "ring-1", "ring-red-300");
        }

        weightedPoints += credits * gradeInfo.points;
        weightedTotalMarks += credits * total;
        totalCredits += credits;
      });

      if (hasInvalidInput) {
        return { valid: false, reason: "Please fix highlighted fields before calculating." };
      }

      const cgpa = totalCredits > 0 ? weightedPoints / totalCredits : 0;
      const percentage = totalCredits > 0 ? weightedTotalMarks / totalCredits : 0;

      return {
        valid: true,
        cgpa,
        percentage,
        passCount,
        failCount,
        totalCredits,
      };
    }

    function updateDashboardSummary(config, result) {
      const cgpaEl = document.getElementById(config.cgpaId);
      const percentageEl = document.getElementById(config.percentageId);
      const passFailEl = document.getElementById(config.passFailId);
      const creditsEl = document.getElementById(config.creditsId);

      if (!result.valid) {
        return;
      }

      cgpaEl.textContent = result.cgpa.toFixed(2);
      percentageEl.textContent = `${result.percentage.toFixed(2)}%`;
      passFailEl.textContent = `${result.passCount} Pass / ${result.failCount} Fail`;
      creditsEl.textContent = String(result.totalCredits);
    }

    function updateAnalytics(config) {
      const marksInput = document.getElementById(config.analytics.marksInputId);
      const marksOutput = document.getElementById(config.analytics.marksOutputId);
      const targetCgpaInput = document.getElementById(config.analytics.targetCgpaInputId);
      const targetCreditsInput = document.getElementById(config.analytics.targetCreditsInputId);
      const targetOutput = document.getElementById(config.analytics.targetOutputId);

      const marksValue = Number(marksInput.value);
      if (Number.isFinite(marksValue) && marksInput.value !== "") {
        const threshold = getScoreThreshold(marksValue);
        if (threshold.next > 100) {
          marksOutput.textContent = "Already at the highest grade band.";
        } else {
          marksOutput.textContent = `Need ${Math.max(0, threshold.next - marksValue).toFixed(2)} more marks to reach ${threshold.grade}.`;
        }
      } else {
        marksOutput.textContent = "Enter a total to see the next grade threshold.";
      }

      const targetCgpa = Number(targetCgpaInput.value);
      const targetCredits = Number(targetCreditsInput.value);
      if (Number.isFinite(targetCgpa) && Number.isFinite(targetCredits) && targetCgpaInput.value !== "" && targetCreditsInput.value !== "") {
        const requiredPoints = targetCgpa * targetCredits;
        targetOutput.textContent = `You need ${requiredPoints.toFixed(2)} weighted points to hit ${targetCgpa.toFixed(2)} CGPA across ${targetCredits} credits.`;
      } else {
        targetOutput.textContent = "Enter a target CGPA and credit count.";
      }
    }

    function buildReport(config, result) {
      const lines = [
        `${config.title}`,
        `Generated: ${new Date().toLocaleString()}`,
        `CGPA: ${result.valid ? result.cgpa.toFixed(2) : "0.00"}`,
        `Percentage: ${result.valid ? `${result.percentage.toFixed(2)}%` : "0.00%"}`,
        `Pass / Fail: ${result.valid ? `${result.passCount} / ${result.failCount}` : "0 / 0"}`,
        `Total Credits: ${result.valid ? result.totalCredits : 0}`,
        "",
        "Subjects",
        "Subject,Type,Credits,Internal,External,Grade,Points",
      ];

      config.subjects.forEach((subject) => {
        const controls = subject.controls;
        const gradeText = controls?.gradeCell.textContent?.trim() || "-";
        const pointsText = controls?.pointsCell.textContent?.trim() || "0";
        const internalText = subject.kind === "ip" ? (controls?.internalInput.value || "0") : (controls?.internalCell.textContent?.trim() || "0.00");
        const externalText = controls?.externalInput.value || "0";
        lines.push([
          subject.subject || "",
          subject.kind === "ip" ? "IP" : subject.type,
          subject.credits || "",
          internalText,
          externalText,
          gradeText,
          pointsText,
        ].join(","));
      });

      return lines.join("\n");
    }

    function downloadReport(config) {
      const result = calculateCGPA(config.subjects);
      const report = buildReport(config, result);
      const blob = new Blob([report], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = `${config.key.toLowerCase()}-cgpa-report.txt`;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
      showToast(`${config.key} report downloaded.`);
    }

    function renderDashboard(configKey) {
      const config = dashboards[configKey];
      ensureSamples(config);
      renderSubjectList(config);
      updateAnalytics(config);

      const addBtn = document.getElementById(config.addBtnId);
      const calculateBtn = document.getElementById(config.calculateBtnId);
      const resetBtn = document.getElementById(config.resetBtnId);
      const downloadBtn = document.getElementById(config.downloadBtnId);
      const marksInput = document.getElementById(config.analytics.marksInputId);
      const targetCgpaInput = document.getElementById(config.analytics.targetCgpaInputId);
      const targetCreditsInput = document.getElementById(config.analytics.targetCreditsInputId);

      addBtn.onclick = () => {
        const subject = createEmptyRegularSubject(configKey);
        config.subjects.push(subject);
        renderDashboard(configKey);
        showToast(`Added a new ${configKey} subject.`);
      };

      calculateBtn.onclick = () => {
        const result = calculateCGPA(config.subjects);
        if (!result.valid) {
          showToast(result.reason);
          return;
        }
        updateDashboardSummary(config, result);
        updateAnalytics(config);
        const resultSection = document.getElementById(config.resultId);
        resultSection.classList.remove("hidden", "animate-floatIn");
        void resultSection.offsetWidth;
        resultSection.classList.add("animate-floatIn");
        resultSection.scrollIntoView({ behavior: "smooth", block: "start" });
        showToast(`${config.key} CGPA calculated.`);
      };

      resetBtn.onclick = () => {
        config.subjects.length = 0;
        if (config.key === "R24") {
          config.subjects.push(cloneSubject(createIpSubject()));
        }
        renderDashboard(configKey);
        const resultSection = document.getElementById(config.resultId);
        resultSection.classList.add("hidden");
        document.getElementById(config.cgpaId).textContent = "0.00";
        document.getElementById(config.percentageId).textContent = "0.00%";
        document.getElementById(config.passFailId).textContent = "0 Pass / 0 Fail";
        document.getElementById(config.creditsId).textContent = "0";
        showToast(`${config.key} dashboard reset.`);
      };

      downloadBtn.onclick = () => downloadReport(config);

      marksInput.oninput = () => updateAnalytics(config);
      targetCgpaInput.oninput = () => updateAnalytics(config);
      targetCreditsInput.oninput = () => updateAnalytics(config);

      config.subjects.forEach((subject) => previewSubject(subject, config));
    }

    function renderR22() {
      renderDashboard("R22");
    }

    function renderR24() {
      renderDashboard("R24");
    }

    function renderR25() {
      renderDashboard("R25");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.remove("hidden", "animate-toastIn");
      void toast.offsetWidth;
      toast.classList.add("animate-toastIn");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toast.classList.add("hidden");
      }, 2200);
    }

    function setActiveDashboard(key) {
      Object.values(dashboards).forEach((config) => {
        const panel = document.getElementById(config.panelId);
        const tab = tabButtons.find((button) => button.dataset.switchDashboard === config.key);
        const active = config.key === key;
        panel.classList.toggle("is-hidden", !active);
        tab.classList.toggle("is-active", active);
        if (active) {
          panel.classList.remove("animate-floatIn");
          void panel.offsetWidth;
          panel.classList.add("animate-floatIn");
        }
      });
    }

    function initializeApp() {
      renderDashboardShell();
      renderR22();
      renderR24();
      renderR25();

      tabButtons.forEach((button) => {
        button.addEventListener("click", () => setActiveDashboard(button.dataset.switchDashboard));
      });

      setActiveDashboard("R22");
    }

    initializeApp();
  </script>
</body>
</html>
